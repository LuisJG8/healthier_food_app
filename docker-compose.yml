services:
  typesense:
    image: typesense/typesense:30.2
    ports:
      - "127.0.0.1:8108:8108"
    volumes:
      - ./typesense-data:/data
    command:
      - "--data-dir"
      - "/data"
      - "--api-key"
      - "${TYPESENSE_ADMIN_KEY:?Set TYPESENSE_ADMIN_KEY in .env before starting Typesense}"
      - "--enable-cors"
